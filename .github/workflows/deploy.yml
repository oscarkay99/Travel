name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e

            REPO_DIR=/opt/rogernort/repo

            # Clone on first run, pull on subsequent runs
            if [ -d "$REPO_DIR/.git" ]; then
              git -C "$REPO_DIR" fetch origin main
              git -C "$REPO_DIR" reset --hard origin/main
            else
              git clone https://github.com/oscarkay99/Travel.git "$REPO_DIR"
            fi

            # Deploy static files
            cp "$REPO_DIR/index.html" /opt/rogernort/nginx/html/
            cp -r "$REPO_DIR/photos/." /opt/rogernort/nginx/html/photos/

            # Rebuild API container if sources changed
            cp -r "$REPO_DIR/api/." /opt/rogernort/api/
            cd /opt/rogernort
            docker compose build api
            docker compose up -d --no-deps --force-recreate api

            echo "✓ Deployed at $(date)"
