name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "index.html,photos/,api/"
          target: /opt/rogernort/deploy/

      - name: Apply deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cp /opt/rogernort/deploy/index.html /opt/rogernort/nginx/html/
            cp -r /opt/rogernort/deploy/photos/ /opt/rogernort/nginx/html/
            cp -r /opt/rogernort/deploy/api/ /opt/rogernort/api-src/

            cd /opt/rogernort
            # Rebuild API only if Dockerfile or server.js changed
            cp -r /opt/rogernort/api-src/. /opt/rogernort/api/
            docker compose build api
            docker compose up -d --no-deps --force-recreate api
            echo "Deploy complete at $(date)"
